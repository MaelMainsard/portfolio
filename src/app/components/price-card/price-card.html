<div #card class="h-full max-w-[20rem] bg-white border flex flex-col border-line">

  <div #popularFrame class="opacity-0">
    <components-corner class="absolute -top-5 -left-5"/>
    <components-corner class="absolute -top-5 -right-5 rotate-90"/>
    <components-corner class="absolute -bottom-5 -left-5 -rotate-90"/>
    <components-corner class="absolute -bottom-5 -right-5 rotate-180"/>
  </div>


  <div class="absolute top-3 left-3 w-8 h-1.5 bg-ink"></div>
  <components-triangle class="absolute top-2 right-2"/>

  <div class="flex flex-col items-center px-6 pt-8 pb-4 gap-1">
    <h1 class="font-code font-bold text-5xl text-black">{{ title() }}</h1>
    <h2 class="font-calling-code text-ink-soft text-sm">{{ subtitle() }}</h2>
  </div>

  <hr class="border-line mx-6" />

  <div class="flex flex-col items-center px-6 py-3 gap-2">
    <h1 class="font-pixel-grid-square-s text-4xl text-black">{{ price() }}</h1>
    <p class="font-calling-code text-ink-muted text-sm">{{ priceDescription() }}</p>
  </div>

  <hr class="border-line mx-6" />

  <ul class="flex flex-col gap-3 px-10 p-3 flex-1 min-h-0">
    @for (feature of features(); track feature) {
      <li class="flex items-start gap-3 font-calling-code text-ink-soft text-base">
        <span class="text-ink-muted leading-none text-xl">○</span>
        <span>{{ feature }}</span>
      </li>
    }
  </ul>

  <hr class="border-line mx-6" />

  <components-code-button class="p-4" (clicked)="clicked.emit()" title="CHOISIR"/>

</div>
