<button (click)="onClick()" #codeButton [class]="'text-white w-full  px-6 py-3 flex items-center justify-between cursor-pointer ' + (type() == ButtonType.PRIMARY ? 'bg-primary hover:bg-primary-hover' : 'bg-accent hover:bg-accent-hover')"
        style="clip-path: polygon(0 0, 100% 0, 100% 80%, calc(100% - 10px) 100%, 0 100%);">
  <span class="font-pixel-grid-square-s text-xl font-bold">{{title()}}</span>
  <svg lucideTriangle fill="white" class="rotate-90"></svg>
</button>
