<div class="w-full h-full flex flex-row justify-between">
  <div class="flex-1 m-20 mr-30 flex flex-col gap-8">
    <div #titleGroup class="flex flex-col gap-2">
      <h1 class="text-ink font-code font-bold text-5xl">INFORMATION PERSONNELS</h1>
      <h2 class="text-ink-muted font-calling-code ">Renseignez vos coordonnées. Je vous recontacte sous 48h pour discuter de votre projet.</h2>
    </div>
    <div class="flex flex-col gap-2">
      <components-textarea title="PRENOM"/>
      <components-textarea title="NOM"/>
      <components-textarea title="EMAIL"/>
      <components-textarea title="DECRIS TON PROJET" [isField]="true"/>
    </div>
    <components-code-button class="w-full" title="ENVOYER"/>
  </div>
  <div class="flex flex-col h-full justify-between py-20">
    @for (i of crosses; track i) {
      <components-cross class="opacity-0"/>
    }
  </div>
  <components-price-card class="flex justify-center items-center my-20 mx-30" [data]="pickedCard()" buttonText="CHANGER" (clicked)="onChangeClick()"/>
</div>
